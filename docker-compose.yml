version: '3.9'

# Standalone local development for stagepass-event-service.
# Brings up: event-service, MongoDB, Kafka (with Zookeeper), Kafka UI.
#
# Usage:
#   docker compose up
#   docker compose up --build   # rebuild after code changes
#
# The full-stack compose (all services together) lives in:
#   stagepass-infrastructure/docker/compose/docker-compose.yml

services:

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  event-mongodb:
    image: mongo:7
    container_name: event-mongodb
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: eventuser
      MONGO_INITDB_ROOT_PASSWORD: eventpass
      MONGO_INITDB_DATABASE: event_db
    volumes:
      - event-mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping")']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Zookeeper (required by Kafka) ───────────────────────────────────────────
  event-zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: event-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ['CMD', 'echo', 'ruok', '|', 'nc', 'localhost', '2181']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka ────────────────────────────────────────────────────────────────────
  event-kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: event-kafka
    depends_on:
      event-zookeeper:
        condition: service_healthy
    ports:
      - '9092:9092'  # External (host) access
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: event-zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://event-kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # Enable idempotent producer support
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ['CMD', 'kafka-broker-api-versions', '--bootstrap-server', 'localhost:9092']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Kafka UI (optional, for local inspection) ────────────────────────────────
  event-kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: event-kafka-ui
    depends_on:
      event-kafka:
        condition: service_healthy
    ports:
      - '8090:8080'
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: event-kafka:29092

  # ── Event Service ────────────────────────────────────────────────────────────
  event-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: event-service
    depends_on:
      event-mongodb:
        condition: service_healthy
      event-kafka:
        condition: service_healthy
    ports:
      - '8082:8082'
    environment:
      PORT: 8082
      NODE_ENV: development
      MONGODB_URI: mongodb://eventuser:eventpass@event-mongodb:27017
      MONGODB_DB_NAME: event_db
      KAFKA_BROKERS: event-kafka:29092
      KAFKA_CLIENT_ID: event-service
      KAFKA_GROUP_ID: event-service-group
      # Auth Service JWKS endpoint — must be running for JWT validation.
      # In standalone mode, start Auth Service separately at localhost:8081.
      JWKS_URI: http://host.docker.internal:8081/auth/jwks
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8082/health/live']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  event-mongo-data:
